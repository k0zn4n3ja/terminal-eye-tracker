name: build

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,  name: linux,   ext: '',     bin: tmux-eyes }
          - { os: windows-latest, name: windows, ext: '.exe', bin: tmux-eyes }
          - { os: macos-latest,   name: macos,   ext: '',     bin: tmux-eyes }

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install runtime + dev + build deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,build]"

      - name: Run tests
        run: pytest -q

      - name: Build single-file executable
        shell: bash
        run: |
          pyinstaller \
            --onefile \
            --name "${{ matrix.bin }}" \
            --collect-all mediapipe \
            --collect-all cv2 \
            entry.py

      - name: Smoke test (--help should not crash)
        shell: bash
        run: |
          ./dist/${{ matrix.bin }}${{ matrix.ext }} --help

      - name: Rename for clarity
        shell: bash
        run: |
          mv "dist/${{ matrix.bin }}${{ matrix.ext }}" \
             "dist/${{ matrix.bin }}-${{ matrix.name }}${{ matrix.ext }}"

      - uses: actions/upload-artifact@v4
        with:
          name: tmux-eyes-${{ matrix.name }}
          path: dist/${{ matrix.bin }}-${{ matrix.name }}${{ matrix.ext }}
          if-no-files-found: error

  rust-build:
    name: rust-${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,  name: linux,   ext: '' }
          - { os: windows-latest, name: windows, ext: '.exe' }
          - { os: macos-latest,   name: macos,   ext: '' }

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Linux system deps (nokhwa + ORT)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libv4l-dev v4l-utils libudev-dev clang libclang-dev linux-headers-$(uname -r) pkg-config

      - name: Cache cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rs/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('rs/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build release binary
        working-directory: rs
        run: cargo build --release

      - name: Run tests
        working-directory: rs
        run: cargo test --release

      - name: Rename
        shell: bash
        working-directory: rs
        run: mv target/release/tmux-eyes${{ matrix.ext }} target/release/tmux-eyes-rs-${{ matrix.name }}${{ matrix.ext }}

      - uses: actions/upload-artifact@v4
        with:
          name: tmux-eyes-rs-${{ matrix.name }}
          path: rs/target/release/tmux-eyes-rs-${{ matrix.name }}${{ matrix.ext }}
          if-no-files-found: error

  release:
    needs: [build, rust-build]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts
        run: |
          mkdir -p release
          find artifacts -type f -exec cp {} release/ \;
          ls -la release

      - uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
