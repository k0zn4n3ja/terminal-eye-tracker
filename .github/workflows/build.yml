name: build

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,  name: linux,   ext: '',     bin: tmux-eyes }
          - { os: windows-latest, name: windows, ext: '.exe', bin: tmux-eyes }
          - { os: macos-latest,   name: macos,   ext: '',     bin: tmux-eyes }

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install runtime + dev + build deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,build]"

      - name: Run tests
        run: pytest -q

      - name: Build single-file executable
        shell: bash
        run: |
          pyinstaller \
            --onefile \
            --name "${{ matrix.bin }}" \
            --collect-all mediapipe \
            --collect-all cv2 \
            entry.py

      - name: Smoke test (--help should not crash)
        shell: bash
        run: |
          ./dist/${{ matrix.bin }}${{ matrix.ext }} --help

      - name: Rename for clarity
        shell: bash
        run: |
          mv "dist/${{ matrix.bin }}${{ matrix.ext }}" \
             "dist/${{ matrix.bin }}-${{ matrix.name }}${{ matrix.ext }}"

      - uses: actions/upload-artifact@v4
        with:
          name: tmux-eyes-${{ matrix.name }}
          path: dist/${{ matrix.bin }}-${{ matrix.name }}${{ matrix.ext }}
          if-no-files-found: error

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts
        run: |
          mkdir -p release
          find artifacts -type f -exec cp {} release/ \;
          ls -la release

      - uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
